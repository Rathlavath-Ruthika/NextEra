<!DOCTYPE html>
<html>
<head>
    <title>AI Sales & Marketing Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>AI Sales & Marketing Intelligence</h1>

<!-- Campaign Generator -->
<h2>Generate Marketing Campaign</h2>

<form action="/generate_campaign" method="post">

    <label>Product:</label>
    <input type="text" name="product" required><br><br>

    <label>Target Audience:</label>
    <input type="text" name="audience" required><br><br>

    <label>Platform:</label>
    <input type="text" name="platform" required><br><br>

    <button type="submit">Generate Campaign</button>

</form>

<hr>


<!-- Sales Pitch Generator -->
<h2>Generate AI Sales Pitch</h2>

<form action="/generate_pitch" method="post">

    <label>Product:</label>
    <input type="text" name="product" required><br><br>

    <label>Customer Persona:</label>
    <input type="text" name="customer" required><br><br>

    <button type="submit">Generate Pitch</button>

</form>

<hr>


<!-- Lead Scoring -->
<h2>Lead Scoring</h2>

<form action="/lead_score" method="post">

    <label>Lead Name:</label>
    <input type="text" name="name" required><br><br>

    <label>Budget:</label>
    <input type="text" name="budget" required><br><br>

    <label>Need:</label>
    <input type="text" name="need" required><br><br>

    <label>Urgency:</label>
    <input type="text" name="urgency" required><br><br>

    <button type="submit">Score Lead</button>

</form>

</body>
</html>
