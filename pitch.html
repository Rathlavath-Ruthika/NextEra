<!DOCTYPE html>
<html>
<head>
<title>Pitch Creator</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="navbar">
<div>MarketAI Suite</div>
</div>

<div class="form-box">

<h2>Sales Pitch Creator</h2>

<form method="POST">

<input name="product" placeholder="Product Name">

<input name="persona" placeholder="Customer Persona">

<button type="submit">Generate Pitch</button>

</form>

{% if pitch %}
<div class="result">{{pitch}}</div>
{% endif %}

</div>

</body>
</html>
